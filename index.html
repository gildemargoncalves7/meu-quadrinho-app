<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Quadrinho App</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Menu lateral -->
    <aside class="sidebar">
      <h2>🎨 Quadrinhos</h2>
      <ul>
        <li onclick="mostrarFerramenta('quadrinho')">🖼️ Quadrinho</li>
        <li onclick="mostrarFerramenta('personagem')">👤 Personagem</li>
        <li onclick="mostrarFerramenta('baloes')">💬 Balões</li>
        <li>⚙️ Configurações</li>
        <li>📤 Exportar</li>
      </ul>
    </aside>

    <!-- Área principal -->
    <main class="editor">
      <!-- Workspace Quadrinho -->
      <section id="quadrinho" class="workspace">
        <h2>Editor de Quadrinhos</h2>
        <canvas id="quadro" width="900" height="500"></canvas>
      </section>

      <!-- Workspace Personagem -->
      <section id="personagem" class="workspace hidden">
        <h2>Model Sheet de Personagem</h2>
        <div class="options">
          <label>Nome: <input type="text" id="nomePersonagem"></label>
          <label>Idade: <input type="number" id="idadePersonagem"></label>
          <label>Estilo de cabelo:
            <select id="cabeloPersonagem">
              <option>Curto</option>
              <option>Longo</option>
              <option>Cacheado</option>
              <option>Liso</option>
            </select>
          </label>
          <label>Roupa:
            <select id="roupaPersonagem">
              <option>Casual</option>
              <option>Herói</option>
              <option>Vilão</option>
              <option>Fantasia</option>
            </select>
          </label>
          <button onclick="gerarModelSheet()">🎨 Criar Model Sheet</button>
        </div>
        <div id="previewPersonagem"></div>
      </section>

      <!-- Workspace Balões -->
      <section id="baloes" class="workspace hidden">
        <h2>Ferramentas de Balões</h2>
        <div class="options">
          <button onclick="adicionarBalao()">➕ Balão Oval</button>
          <button onclick="adicionarBalaoExplosivo()">💥 Balão Explosivo</button>
          <button onclick="adicionarBalaoNuvem()">☁️ Balão de Pensamento</button>
          <button onclick="limparCanvas()">🗑️ Limpar Canvas</button>
        </div>
      </section>
    </main>
  </div>

  <footer>
    <p>© 2026 - Gildemar Comics Studio</p>
  </footer>

  <script src="scripts/script.js"></script>
</body>
</html>
